# =============================================================================
# Alembic Configuration
# https://alembic.sqlalchemy.org/
# =============================================================================
# Использование:
#   alembic revision --autogenerate -m "описание"
#   alembic upgrade head
#   alembic downgrade -1
# =============================================================================

[config]
# Путь к скриптам миграций (относительно alembic.ini)
script_location = alembic

# Кодировка файлов миграций
file_template = %%(rev)s_%%(slug)s

# Максимальная длина строки в файлах миграций
truncate_slug_length = 40

# URL БД — переопределяется через переменную окружения или env.py
# Формат: postgresql+asyncpg://user:pass@host:5432/dbname
sqlalchemy.url = driver://user:pass@localhost/dbname

# Логирование SQL
# logging_level = WARN

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# =============================================================================
# Замена переменных окружения в alembic.ini
# =============================================================================
# =============================================================================
