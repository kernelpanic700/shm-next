version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-shm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shm_secret}
      POSTGRES_DB: ${DB_NAME:-shm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-shm}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

  api:
    build: .
      target: runtime
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-shm}:${DB_PASSWORD:-shm_secret}@postgres:5432/${DB_NAME:-shm}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me}
    ports:
      - '${API_PORT:-8000}:8000'
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    profiles: [dev]

volumes:
  pgdata:
  redisdata:
