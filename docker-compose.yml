# =============================================================================
# shm-next — Docker Compose
# =============================================================================
# Dev:  docker compose --profile dev up
# Prod: docker compose --profile prod up -d
# =============================================================================

services:
  # ============================================================
  # PostgreSQL 16 (Non-standard port: 15432)
  # ============================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-shm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-shm_secret}
      POSTGRES_DB: ${DB_NAME:-shm}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${DB_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-shm}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ============================================================
  # Redis 7 (Non-standard port: 16379)
  # ============================================================
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-16379}:6379"
    volumes:
      - redisdata:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ============================================================
  # API Server (Litestar + Uvicorn) - Port 8001
  # ============================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-shm}:${DB_PASSWORD:-shm_secret}@postgres:5432/${DB_NAME:-shm}
      - REDIS_URL=redis://redis:6379/0
      - TASKIQ_BROKER_URL=redis://redis:6379/1
      - TASKIQ_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-at-least-32-chars}
      - ADMIN_PHONE=${ADMIN_PHONE:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SENTRY_DSN=${SENTRY_DSN:-}
    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Профиль dev — с hot-reload
    profiles:
      - dev
      - default
    volumes:
      - ./app:/app/app:ro
    command: >
      uvicorn app.api.app:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --reload
      --log-level debug
      --proxy-headers
      --forwarded-allow-ips='*'

  # ============================================================
  # API Server (Production — multi-worker, без hot-reload)
  # ============================================================
  api-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-shm}:${DB_PASSWORD:-shm_secret}@postgres:5432/${DB_NAME:-shm}
      - REDIS_URL=redis://redis:6379/0
      - TASKIQ_BROKER_URL=redis://redis:6379/1
      - TASKIQ_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_PHONE=${ADMIN_PHONE:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH:-}
      - DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
      - SENTRY_DSN=${SENTRY_DSN:-}
    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    profiles:
      - prod
    command: >
      uvicorn app.api.app:app
      --host 0.0.0.0
      --port 8000
      --workers ${WEB_CONCURRENCY:-4}
      --log-level warning
      --proxy-headers
      --forwarded-allow-ips='*'

  # ============================================================
  # Taskiq Worker
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-shm}:${DB_PASSWORD:-shm_secret}@postgres:5432/${DB_NAME:-shm}
      - REDIS_URL=redis://redis:6379/0
      - TASKIQ_BROKER_URL=redis://redis:6379/1
      - TASKIQ_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    profiles:
      - dev
    healthcheck:
      disable: true
    command: taskiq worker app.worker.app:broker --workers 2 --log-level INFO

  worker-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-shm}:${DB_PASSWORD:-shm_secret}@postgres:5432/${DB_NAME:-shm}
      - REDIS_URL=redis://redis:6379/0
      - TASKIQ_BROKER_URL=redis://redis:6379/1
      - TASKIQ_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=false
      - LOG_LEVEL=${LOG_LEVEL:-WARNING}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    profiles:
      - prod
    healthcheck:
      disable: true
    command: taskiq worker app.worker.app:broker --workers 4 --log-level WARNING

  # ============================================================
  # Client Panel (Next.js) - Port 3001
  # ============================================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8001}/api/v1
        NEXT_PUBLIC_ADMIN_URL: http://localhost:${ADMIN_PORT:-3002}
        NEXT_PUBLIC_ENABLE_REGISTRATION: ${ENABLE_CLIENT_REGISTRATION:-false}
    ports:
      - "${CLIENT_PORT:-3001}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8001}/api/v1
      - NEXT_PUBLIC_ADMIN_URL=http://localhost:${ADMIN_PORT:-3002}
      - NEXT_PUBLIC_ENABLE_REGISTRATION=${ENABLE_CLIENT_REGISTRATION:-false}
    depends_on:
      - api-prod
    profiles:
      - prod

  # ============================================================
  # Admin Panel (Next.js) - Port 3002
  # ============================================================
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8001}/api/v1
        NEXT_PUBLIC_ADMIN_URL: http://localhost:${ADMIN_PORT:-3002}
        API_REWRITE_URL: http://api-prod:8000/api/:path*
    ports:
      - "${ADMIN_PORT:-3002}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT:-8001}/api/v1
      - NEXT_PUBLIC_ADMIN_URL=http://localhost:3002
      - API_REWRITE_URL=http://api-prod:8000/api/:path*
    depends_on:
      - api-prod
    profiles:
      - prod

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  shm-next:
    driver: bridge
